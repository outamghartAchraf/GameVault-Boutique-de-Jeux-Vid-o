<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" />
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">
    
      <header class="sticky top-0 z-40 bg-gray-900/95 backdrop-blur-sm border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

      <!-- Logo -->
      <div class="text-xl font-bold tracking-tight">
        Game<span class="text-indigo-400">Achraf</span>
      </div>

      <!-- US5 : Cart button -->
      <button id="cartBtn"
        class="relative flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 hover:border-indigo-500 text-sm font-medium px-4 py-2 rounded-xl transition-all duration-200">
        <i class="fas fa-shopping-cart w-4 h-4"></i>
        Mon panier
        <!-- Badge (US4) -->
        <span id="cartBadge"
          class="hidden absolute -top-2 -right-2 bg-indigo-500 text-white text-[10px] font-bold min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center">
          0
        </span>
      </button>

    </div>
  </header>


  <!-- HERO SECTION -->
  <section class="relative h-screen flex items-center justify-center text-center overflow-hidden">

    <!-- Background Image -->
    <div class="absolute inset-0">
      <img 
        src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80"
        class="w-full h-full object-cover scale-110 blur-[2px]"
      />
    </div>

    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-black/70 to-black/90"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-2xl px-4">
      
      <!-- Badge -->
      <span class="bg-indigo-500/20 text-indigo-400 px-4 py-1 rounded-full text-sm">
        🎮 Game Store
      </span>

      <!-- Title -->
      <h1 class="mt-4 text-4xl sm:text-6xl font-extrabold text-white leading-tight">
        Explorez les meilleurs 
        <span class="text-indigo-400">jeux</span>
      </h1>

      <!-- Description -->
      <p class="mt-4 text-gray-300 text-lg">
        Téléchargement instantané, prix imbattables et expérience rapide ⚡
      </p>

      <!-- Buttons -->
      <div class="mt-8 flex justify-center gap-4 flex-wrap">
        
        <a href="#"
           class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg transition duration-300">
          Acheter maintenant
        </a>

        <a href="#"
           class="border border-white/30 hover:bg-white/10 text-white px-6 py-3 rounded-xl transition duration-300">
          Voir les jeux
        </a>

      </div>
    </div>

  </section>


  
    
</body>
</html>
