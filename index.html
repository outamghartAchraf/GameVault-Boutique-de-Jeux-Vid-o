<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" />
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">
    
<header class="sticky top-0 z-40 bg-gray-950/90 backdrop-blur-md border-b border-gray-800 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center gap-2 text-xl font-extrabold tracking-tight">
      <i class="fa-solid fa-gamepad text-indigo-400 text-lg"></i>
      <span class="text-white">Game</span>
      <span class="text-indigo-400">Achraf</span>
    </div>

    <!-- Cart Button -->
    <button id="cartBtn"
      class="relative flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium text-white
             bg-gradient-to-r from-gray-800 to-gray-900 border border-gray-700
             hover:from-indigo-600 hover:to-purple-600 hover:border-indigo-400
             transition-all duration-300 shadow-md hover:shadow-indigo-500/30">

      <i class="fas fa-shopping-cart text-base"></i>
      <span>Mon panier</span>

      <span id="cartBadge"
        class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold
               min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center animate-pulse">
        0
      </span>
    </button>

  </div>
</header>


  
<!-- HERO SECTION -->
<section class="relative h-[65vh] sm:h-[75vh] md:h-[85vh] flex items-center justify-center text-center overflow-hidden">

  <!-- Background Image -->
  <div class="absolute inset-0">
    <img 
      src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1600&q=80"
      class="w-full h-full object-cover scale-105 brightness-75"
    />
  </div>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/60 to-black/90"></div>

  <!-- Content -->
  <div class="relative z-10 max-w-2xl px-6">

    <!-- Badge -->
    <span class="inline-flex items-center gap-2 bg-white/10 text-indigo-400 px-4 py-1.5 rounded-full text-sm backdrop-blur border border-white/10">
      <i class="fa-solid fa-gamepad"></i>
      Game Store
    </span>

    <!-- Title -->
    <h1 class="mt-5 text-3xl sm:text-5xl md:text-6xl font-extrabold text-white leading-tight">
      Explorez les meilleurs 
      <span class="text-indigo-400">jeux</span>
    </h1>

    <!-- Description -->
<p class="mt-4 text-gray-300 text-sm sm:text-base md:text-lg">
  <i class="fa-solid fa-bolt"></i> Téléchargement instantané •
  <i class="fa-solid fa-coins"></i> Prix imbattables •
  <i class="fa-solid fa-rocket"></i> Expérience fluide
</p>

    <!-- Buttons -->
    <div class="mt-6 flex justify-center gap-4">

      <button class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 
                     text-white font-semibold transition shadow-md">
        Explorer
      </button>

      <button class="px-6 py-3 rounded-xl border border-white/20 text-white 
                     hover:bg-white/10 transition">
        Top jeux
      </button>

    </div>

    <!-- Icons -->
    <div class="mt-6 flex justify-center gap-6 text-white/70 text-lg">
      <i class="fa-solid fa-download hover:text-indigo-400 transition"></i>
      <i class="fa-solid fa-credit-card hover:text-indigo-400 transition"></i>
      <i class="fa-solid fa-shield-halved hover:text-indigo-400 transition"></i>
    </div>

  </div>

</section>


<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6
            flex flex-col gap-3 sm:flex-row sm:items-center">

  
  <div class="relative w-full sm:w-72">

    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none"></i>

    <input id="searchInput"
      type="search"
      placeholder="Rechercher un jeu…"
      class="w-full bg-gray-900 border border-gray-700 focus:border-indigo-500
             focus:ring-2 focus:ring-indigo-500/30 focus:outline-none
             text-sm text-white placeholder-gray-500 rounded-xl
             pl-9 pr-4 py-2.5 transition" />
  </div>

   
  <div id="filters"
    class="flex flex-wrap gap-2 w-full sm:w-auto">
 
  </div>

 
  <span id="resultCount"
    class="sm:ml-auto text-gray-400 text-xs sm:text-sm">
    12
  </span>

</div>


<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">

  <div id="catalogue"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
  </div>

  <div id="emptyState" class="hidden text-center py-20 text-gray-500">

    <p class="text-5xl mb-4">
      <i class="fas fa-gamepad"></i>
    </p>

    <p class="text-sm">
      <i class="fas fa-search"></i>
      Aucun jeu trouvé pour cette recherche.
    </p>

  </div>

</main>

  
<div id="cartPage" class="hidden fixed inset-0 z-50 bg-gray-900 overflow-y-auto">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 py-8 min-h-screen flex flex-col">

     
    <div class="flex items-center gap-4 pb-6 mb-6 border-b border-gray-800">

      <button id="backBtn"
        class="flex items-center gap-1.5 text-xs font-semibold text-indigo-400
               border border-gray-700 hover:border-indigo-500 px-3 py-2 rounded-xl transition-colors">
        <i class="fas fa-arrow-left"></i>
        Retour
      </button>

      <h2 class="text-xl font-bold flex items-center gap-2">
        <i class="fas fa-shopping-cart text-indigo-400"></i>
        Mon Panier
      </h2>

    </div>

    
    <div id="cartList" class="flex flex-col gap-3 flex-1"></div>

     
    <div id="cartEmpty" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-gray-500 py-24">

      <p class="text-5xl">
        <i class="fas fa-gamepad"></i>
      </p>

      <p class="text-sm font-medium flex items-center gap-2">
        <i class="fas fa-shopping-basket text-gray-600"></i>
        Votre panier est vide.
      </p>

    </div>

   
    <div id="cartFooter" class="hidden pt-6 mt-6 border-t border-gray-800
                                 flex items-center justify-between flex-wrap gap-4">

      <div>
        <p class="text-gray-400 text-xs font-medium uppercase tracking-wider mb-1 flex items-center gap-1">
          <i class="fas fa-receipt"></i>
          Total
        </p>

        <p id="cartTotal" class="text-indigo-400 text-2xl font-bold flex items-center gap-2">
          <i class="fas fa-coins"></i>
          0,00 €
        </p>
      </div>

      <button id="orderBtn"
        class="bg-indigo-600 hover:bg-indigo-500 active:scale-95
               text-white font-semibold text-sm px-8 py-3 rounded-xl transition-all duration-150 flex items-center gap-2">

        <i class="fas fa-credit-card"></i>
        Commander 

      </button>

    </div>

  </div>
</div>
  
<div id="toast"
  class="fixed top-6 right-6
         translate-y-10 opacity-0
         bg-gray-800 border border-green-600/60 text-green-400
         text-sm font-medium px-5 py-3 rounded-xl shadow-xl
         transition-all duration-300 pointer-events-none z-50 whitespace-nowrap">
</div>

<footer class="bg-gray-950 border-t border-gray-800 py-6 mt-10">
  <div class="max-w-7xl mx-auto px-4 text-center">
    
    <div class="flex items-center justify-center gap-2 text-lg font-semibold">
      <i class="fa-solid fa-gamepad text-indigo-400"></i>
      <span class="text-white">Game</span>
      <span class="text-indigo-400">Achraf</span>
    </div>

    <p class="text-gray-500 text-xs mt-2">
      © 2026 All rights reserved
    </p>

  </div>
</footer>


  <script type="module" src="app.js"></script>
</body>
</html>
