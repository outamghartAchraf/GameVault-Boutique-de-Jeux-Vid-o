<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" />
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">
    
      <header class="sticky top-0 z-40 bg-gray-900/95 backdrop-blur-sm border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

      <!-- Logo -->
      <div class="text-xl font-bold tracking-tight">
        Game<span class="text-indigo-400">Achraf</span>
      </div>

      <!-- US5 : Cart button -->
      <button id="cartBtn"
        class="relative flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 hover:border-indigo-500 text-sm font-medium px-4 py-2 rounded-xl transition-all duration-200">
        <i class="fas fa-shopping-cart w-4 h-4"></i>
        Mon panier
        <!-- Badge (US4) -->
        <span id="cartBadge"
          class="hidden absolute -top-2 -right-2 bg-indigo-500 text-white text-[10px] font-bold min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center">
          0
        </span>
      </button>

    </div>
  </header>

  
    
</body>
</html>
